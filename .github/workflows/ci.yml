name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # deps/discordgo-self is a vendored third-party fork — keep it out of
      # formatting checks so its diff against upstream stays readable.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l ./internal ./main.go)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: test (race)
        run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build ${{ matrix.goos }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
        run: go build ./...
